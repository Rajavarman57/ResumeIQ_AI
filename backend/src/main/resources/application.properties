# Server
server.port=8080
server.servlet.context-path=/api

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:resumeiq;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=ResumeIQ_Super_Secret_Key_2026_Must_Be_At_Least_256_Bits_Long_For_HS256
app.jwt.expiration=86400000

# File Storage
app.upload.dir=./uploads

# Logging
logging.level.com.resumeiq=INFO
logging.level.org.springframework.security=WARN

# Anthropic Claude API
anthropic.api.key=${ANTHROPIC_API_KEY:your-api-key-here}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-opus-4-5

# ── Email (SMTP) ──────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@resumeiq.local}
app.mail.enabled=${MAIL_ENABLED:false}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
