version: '3.9'

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: resumeiq-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: resumeiq
      MYSQL_USER: resumeiq
      MYSQL_PASSWORD: ${DB_PASSWORD:-resumeiq123}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - resumeiq-net

  # ── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumeiq-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/resumeiq?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: resumeiq
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-resumeiq123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@resumeiq.local}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      APP_JWT_SECRET: ${JWT_SECRET:-ResumeIQ_Super_Secret_Key_2026_Must_Be_At_Least_256_Bits_Long_For_HS256}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - resumeiq-net
    healthcheck:
      test: ["CMD","wget","--quiet","--tries=1","--spider","http://localhost:8080/api/auth/me","||","true"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Vanilla JS Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumeiq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 5173
    ports:
      - "5173:5173"
    networks:
      - resumeiq-net

volumes:
  db_data:
  uploads_data:

networks:
  resumeiq-net:
    driver: bridge
